<div class="page">
  <div class="container px-5">
    <div class="row">
      <div class="col-12 page-title">
        <h1>{{title}}</h1>
      </div>
    </div>
    <div class="row">
      <div class="col-12 text-center">
        <div *ngFor="let educ of education">
          <h5>{{ educ.titulo }}</h5>
          <p class="my-0">{{ educ.institucion }}</p>
          <p><small class="text-muted">{{ educ.fechaFin | date:"MMM-y" }}</small></p>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12 page-title">
        <h3 class="mt-3 certifications">{{certificationTitleTran}}</h3>
      </div>
    </div>
    <div class="row" style="justify-content: center;">
      <div class="col-12 col-md-6" *ngFor="let cert of certifications">
        <app-certification [cert]="cert"></app-certification>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <h5 class="text-center continuous-learning">{{continuousLearningTran}}</h5>
      </div>
      <div class="col-12">
        <swiper-container slides-per-view="1" space-between="10" pagination="true" navigation="true"
          breakpoints='{"640": {"slidesPerView": 2}, "1024": {"slidesPerView": 3}}' grab-cursor="true"
          pagination-type="fraction">
          <swiper-slide *ngFor="let cert of minorCertifications">
            <app-certification [cert]="cert"></app-certification>
          </swiper-slide>
        </swiper-container>
      </div>
    </div>
  </div>
</div>
